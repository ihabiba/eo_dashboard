name: Daily Alert Check

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Write subscribers list
        run: |
          python -c "
          import json, os
          ids = [i.strip() for i in os.environ['TELEGRAM_SUBSCRIBERS'].split(',') if i.strip()]
          with open('data/subscribers.json', 'w') as f:
              json.dump(ids, f)
          "
        env:
          TELEGRAM_SUBSCRIBERS: ${{ secrets.TELEGRAM_SUBSCRIBERS }}

      - name: Run alert check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python alert_watcher.py --once
